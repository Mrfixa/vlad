name: Build APKs

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'master'
      - 'vlad'
      - 'claude/analyze-mart-qr-code-FySPn'
      - 'claude/init-yn5zw0'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag to create (e.g. v2.0.0)'
        required: false
        type: string

jobs:
  build-driver-apk:
    name: Build Driver APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: drivemond-driver-app-3.1/HexaRide-Driver-app-release-3.1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Clean disk space
        run: |
          rm -rf build android/.gradle ~/.gradle 2>/dev/null || true
          df -h / || true

      - name: Setup release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=app/release.jks\n' \
              "$KEYSTORE_PASS" "$KEY_PASS" "$KEY_ALIAS" > android/key.properties
          fi

      - name: Build release APK
        id: build
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
        run: |
          set -o pipefail
          flutter build apk --release \
            --dart-define=MAPS_API_KEY=${{ secrets.MAPS_API_KEY }} \
            --dart-define=STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }} \
            --dart-define=MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }} \
            --dart-define=ANDROID_MANIFEST_MAPBOX_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }} \
            2>&1 | tee build.log

      - name: Upload build log on failure
        if: failure()
        run: |
          cat build.log
          find build/app/outputs -name "*.apk" 2>/dev/null || echo "No APKs found"
          cat android/app/build.gradle.kts 2>/dev/null | head -30

      - name: Stage Driver APK
        run: |
          APK=$(find build/app/outputs/flutter-apk -name "*.apk" ! -name "*unsigned*" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No signed APK found in build/app/outputs/flutter-apk/"
            find build/app/outputs -name "*.apk" 2>/dev/null || true
            exit 1
          fi
          echo "Staging: $APK"
          cp "$APK" "$GITHUB_WORKSPACE/vito-driver-release.apk"

      - name: Upload Driver Release APK
        uses: actions/upload-artifact@v4
        with:
          name: vito-driver-release-apk
          path: ${{ github.workspace }}/vito-driver-release.apk
          if-no-files-found: warn
          retention-days: 14

  build-user-apk:
    name: Build User APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: drivemond-user-app-3.1/HexaRide-User-app-release-3.1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Clean disk space
        run: |
          rm -rf build android/.gradle ~/.gradle 2>/dev/null || true
          df -h / || true

      - name: Setup release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=app/release.jks\n' \
              "$KEYSTORE_PASS" "$KEY_PASS" "$KEY_ALIAS" > android/key.properties
          fi

      - name: Build release APK
        id: build
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
        run: |
          set -o pipefail
          flutter build apk --release \
            --dart-define=MAPS_API_KEY=${{ secrets.MAPS_API_KEY }} \
            --dart-define=STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }} \
            --dart-define=MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }} \
            --dart-define=ANDROID_MANIFEST_MAPBOX_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }} \
            2>&1 | tee build.log

      - name: Upload build log on failure
        if: failure()
        run: |
          cat build.log
          find build/app/outputs -name "*.apk" 2>/dev/null || echo "No APKs found"

      - name: Stage User APK
        run: |
          APK=$(find build/app/outputs/flutter-apk -name "*.apk" ! -name "*unsigned*" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No signed APK found in build/app/outputs/flutter-apk/"
            find build/app/outputs -name "*.apk" 2>/dev/null || true
            exit 1
          fi
          echo "Staging: $APK"
          cp "$APK" "$GITHUB_WORKSPACE/vito-user-release.apk"

      - name: Upload User Release APK
        uses: actions/upload-artifact@v4
        with:
          name: vito-user-release-apk
          path: ${{ github.workspace }}/vito-user-release.apk
          if-no-files-found: warn
          retention-days: 14

  build-admin-zip:
    name: Build Admin ZIP
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: drivemond-admin-new-install-3.1

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring,xml,ctype,json,bcmath,pdo_mysql

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --no-interaction --optimize-autoloader --ignore-platform-reqs

      - name: Create release ZIP
        working-directory: ${{ github.workspace }}
        run: |
          VERSION=$(grep '^version:' drivemond-user-app-3.1/HexaRide-User-app-release-3.1/pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "Building admin ZIP for version $VERSION"
          zip -r "vito-admin-v${VERSION}.zip" drivemond-admin-new-install-3.1 \
            --exclude "*/node_modules/*" \
            --exclude "*/.git/*" \
            --exclude "*/storage/logs/*" \
            --exclude "*/.env" \
            --exclude "*/storage/framework/cache/*" \
            --exclude "*/storage/framework/views/*" \
            --exclude "*/storage/framework/sessions/*"

      - name: Upload Admin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: vito-admin-zip
          path: vito-admin-v*.zip

  laravel-checks:
    name: Laravel Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: drivemond-admin-new-install-3.1

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, bcmath, pdo_mysql

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --ignore-platform-reqs

      - name: PHP syntax check
        run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \; | grep -v "No syntax errors" || true

  build-driver-ios:
    name: Build Driver iOS
    runs-on: macos-14
    defaults:
      run:
        working-directory: drivemond-driver-app-3.1/HexaRide-Driver-app-release-3.1

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Build iOS (simulator)
        run: |
          flutter build ios --simulator --no-codesign 2>&1 | tee build.log

      - name: Upload iOS build log
        if: failure()
        run: cat build.log

      - name: Upload Driver iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: vito-driver-ios
          path: build/ios/iphonesimulator/
          if-no-files-found: warn

  build-user-ios:
    name: Build User iOS
    runs-on: macos-14
    defaults:
      run:
        working-directory: drivemond-user-app-3.1/HexaRide-User-app-release-3.1

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Build iOS (simulator)
        run: |
          flutter build ios --simulator --no-codesign 2>&1 | tee build.log

      - name: Upload iOS build log
        if: failure()
        run: cat build.log

      - name: Upload User iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: vito-user-ios
          path: build/ios/iphonesimulator/
          if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    needs: [build-driver-apk, build-user-apk, build-admin-zip, build-driver-ios, build-user-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="${{ github.event.inputs.version }}"
          elif echo "${{ github.ref }}" | grep -q '^refs/tags/'; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v$(grep '^version:' drivemond-user-app-3.1/HexaRide-User-app-release-3.1/pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Download Driver Debug APK
        uses: actions/download-artifact@v4
        with:
          name: vito-driver-debug-apk
          path: release-assets/
        continue-on-error: true

      - name: Download Driver Release APK
        uses: actions/download-artifact@v4
        with:
          name: vito-driver-release-apk
          path: release-assets/
        continue-on-error: true

      - name: Download User Debug APK
        uses: actions/download-artifact@v4
        with:
          name: vito-user-debug-apk
          path: release-assets/
        continue-on-error: true

      - name: Download User Release APK
        uses: actions/download-artifact@v4
        with:
          name: vito-user-release-apk
          path: release-assets/
        continue-on-error: true

      - name: Download Admin ZIP
        uses: actions/download-artifact@v4
        with:
          name: vito-admin-zip
          path: release-assets/

      - name: Download Driver iOS
        uses: actions/download-artifact@v4
        with:
          name: vito-driver-ios
          path: release-assets/
        continue-on-error: true

      - name: Download User iOS
        uses: actions/download-artifact@v4
        with:
          name: vito-user-ios
          path: release-assets/
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Vito ${{ steps.ver.outputs.tag }}
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
